<!DOCTYPE html>
<html>
<head>
  <title>Boston Hospital Finder</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
    #header { background: #003087; color: white; padding: 15px; }
    #controls { padding: 10px; background: #eee; }
    #main { display: flex; flex: 1; }
    #map { flex: 1; }
    #sidebar { width: 350px; overflow-y: auto; padding: 10px; border-left: 1px solid #ccc; }
    .hospital-card { border: 1px solid #ddd; padding: 10px; margin-bottom: 5px; cursor: pointer; }
    .vuln-bar-bg { height: 6px; background: #eee; width: 100%; }
    .vuln-bar { height: 100%; }
  </style>
</head>
<body>
  <div id="header"><h1>Boston Hospital Finder</h1></div>
  <div id="controls">
    <input type="text" id="zip" placeholder="Enter ZIP (e.g. 02115)">
    <button onclick="findHospitals()">Search</button>
  </div>
  <div id="main">
    <div id="map"></div>
    <div id="sidebar"><div id="results"></div></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const HOSPITAL_CSV = "https://data.boston.gov/dataset/d9871e89-2d1e-4ecf-b0de-046f553027c0/resource/6222085d-ee88-45c6-ae40-0c7464620d64/download/hospital-locations.csv";
    const VULN_CSV = "https://bostonopendata-boston.opendata.arcgis.com/api/download/v1/items/34f2c48b670d4b43a617b1540f20efe3/csv?layers=0";

    const map = L.map('map').setView([42.3601, -71.0589], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const markersLayer = L.layerGroup().addTo(map);
    let vulnByNeigh = {};

    async function loadVulnerability() {
      const text = await fetch(VULN_CSV).then(r => r.text());
      const rows = text.split('\n').map(l => l.split(','));
      const headers = rows[0].map(h => h.trim().toUpperCase());
      rows.slice(1).forEach(row => {
        let obj = {}; headers.forEach((h, i) => obj[h] = row[i]);
        if (!obj.NAME) return;
        const n = obj.NAME.trim().toUpperCase();
        if (!vulnByNeigh[n]) vulnByNeigh[n] = { pop: +obj.POP100_RE || 1, older: 0, child: 0, low: 0, dis: 0, lep: 0 };
        vulnByNeigh[n].older += +obj.OLDERADULT || 0;
        vulnByNeigh[n].child += +obj.TOTCHILD || 0;
        vulnByNeigh[n].low += +obj.LOW_TO_NO || 0;
        vulnByNeigh[n].dis += +obj.TOTDIS || 0;
        vulnByNeigh[n].lep += +obj.LEP || 0;
      });
    }

    async function findHospitals() {
      const zip = document.getElementById("zip").value;
      const res = await fetch(`https://api.zippopotam.us/us/${zip}`);
      const data = await res.json();
      const cLat = +data.places[0].latitude, cLon = +data.places[0].longitude;
      
      if (Object.keys(vulnByNeigh).length === 0) await loadVulnerability();
      const hospText = await fetch(HOSPITAL_CSV).then(r => r.text());
      const hospitals = hospText.split('\n').map(l => l.split(',')).slice(1);
      
      markersLayer.clearLayers();
      document.getElementById("results").innerHTML = "";

      hospitals.forEach(h => {
        const name = h[0], addr = h[1], neigh = h[2], loc = h[7] + h[8];
        const coords = loc.match(/[-+]?[0-9]*\.?[0-9]+/g);
        if (!coords || coords.length < 2) return;
        const lat = +coords[0], lon = +coords[1];
        
        const dist = Math.sqrt(Math.pow((lat - cLat)*69, 2) + Math.pow((lon - cLon)*52, 2));
        if (dist > 10) return;

        const v = vulnByNeigh[neigh.trim().toUpperCase()];
        const score = v ? ( (v.older/v.pop) + (v.child/v.pop) + (v.low/v.pop) + (v.dis/v.pop) + (v.lep/v.pop) ) / 5 : 0;
        const color = score > 0.12 ? 'red' : score > 0.07 ? 'orange' : 'green';

        const m = L.circleMarker([lat, lon], { color: color }).addTo(markersLayer);
        m.bindPopup(`<b>${name}</b><br>Score: ${(score*100).toFixed(1)}%`);

        const div = document.createElement("div");
        div.className = "hospital-card";
        div.innerHTML = `<b>${name}</b><br>${neigh}`;
        div.onclick = () => { map.setView([lat, lon], 14); m.openPopup(); };
        document.getElementById("results").appendChild(div);
      });
      map.fitBounds(markersLayer.getBounds());
    }
  </script>
</body>
</html>
